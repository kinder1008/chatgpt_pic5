<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChatGPT 圖像提示詞工具</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Image Prompt Builder</p>
        <h1>ChatGPT 圖像提示詞工具</h1>
      </div>
      <div class="top-actions">
        <input id="searchInput" type="search" placeholder="搜尋內容類型">
      </div>
    </header>

    <section class="step-layout">
      <section class="step-panel" aria-labelledby="categoryTitle">
        <div class="step-heading">
          <span class="step-number">1</span>
          <div>
            <h2 id="categoryTitle">選擇分類</h2>
            <p>先決定你想做哪一類圖片。</p>
          </div>
        </div>
        <div id="categoryCards" class="category-grid"></div>
      </section>

      <section class="step-panel" aria-labelledby="optionTitle">
        <div class="step-heading">
          <span class="step-number">2</span>
          <div>
            <h2 id="optionTitle">選擇產出內容</h2>
            <p id="optionHint">選完分類後，這裡會展開可用選項。</p>
          </div>
        </div>
        <div id="optionCards" class="option-grid"></div>
      </section>
    </section>

    <section class="builder-layout">
      <section class="spec-panel" aria-labelledby="specTitle">
        <div class="step-heading">
          <span class="step-number">3</span>
          <div>
            <h2 id="specTitle">說出你的規格</h2>
            <p>填得越具體，複製出去的提示詞越接近你要的結果。</p>
          </div>
        </div>

        <div class="form-grid">
          <label>
            <span>主題或目的</span>
            <input id="subjectInput" type="text" placeholder="例如：新品上市、生日海報、釜山旅行">
          </label>
          <label>
            <span>品牌／人物／產品</span>
            <input id="targetInput" type="text" placeholder="例如：咖啡品牌、上傳照片中的人物">
          </label>
          <label>
            <span>平台或用途</span>
            <select id="platformSelect">
              <option>ChatGPT</option>
              <option>Midjourney</option>
              <option>Gemini</option>
              <option>社群貼文</option>
              <option>簡報</option>
              <option>其他</option>
            </select>
          </label>
          <label>
            <span>尺寸比例</span>
            <select id="ratioSelect"></select>
          </label>
          <label>
            <span>畫面文字</span>
            <input id="copyInput" type="text" placeholder="例如：Summer Sale、HAPPY BIRTHDAY">
          </label>
          <label>
            <span>風格偏好</span>
            <input id="styleInput" type="text" placeholder="例如：高級、可愛、韓系、復古、極簡">
          </label>
        </div>

        <label class="wide-field">
          <span>補充需求</span>
          <textarea id="extraInput" placeholder="例如：背景要乾淨、文字要清楚、不要過度裝飾、保留人物五官"></textarea>
        </label>

        <div class="upload-panel">
          <div>
            <label class="field-label" for="imageInput">參考圖片</label>
            <p id="imageHelp">如果選項需要照片，請先在這裡確認要使用的圖片。</p>
          </div>
          <input id="imageInput" type="file" accept="image/*">
          <div id="imagePreview" class="image-preview">
            <span>尚未選擇圖片</span>
          </div>
        </div>
      </section>

      <section class="output-panel" aria-labelledby="outputTitle">
        <div class="output-header">
          <div>
            <p id="selectedCategoryText" class="eyebrow">尚未選擇</p>
            <h2 id="outputTitle">請先選擇內容</h2>
          </div>
          <div class="meta-row">
            <span id="ratioBadge" class="badge">比例</span>
            <span id="imageBadge" class="badge">圖片</span>
          </div>
        </div>

        <div class="next-step">
          <div class="panel-title">使用方式</div>
          <ol id="nextSteps"></ol>
        </div>

        <div class="prompt-box">
          <div class="panel-title">完整可複製提示詞</div>
          <textarea id="outputPrompt" spellcheck="false"></textarea>
          <div class="action-row">
            <button id="copyButton" type="button" class="primary-button">複製提示詞</button>
            <button id="resetButton" type="button" class="secondary-button">清空規格</button>
            <span id="copyStatus" role="status"></span>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="prompts-data.js?v=20260623-doc"></script>
  <script src="app.js?v=20260623-doc"></script>
</body>
</html>
